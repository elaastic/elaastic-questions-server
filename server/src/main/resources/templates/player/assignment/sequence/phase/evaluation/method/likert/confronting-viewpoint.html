<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html" style="overflow: hidden">
<head>
  <meta charset="UTF-8">
  <title>Likert scale input</title>

  <script src="https://unpkg.com/vue@3.5.12/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@3.7.3/dist/vuetify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@iframe-resizer/child@5.3.2"></script>
  <script th:src="@{/vue-components/elaastic-vue-components-v0.0.3.umd.min.js}"></script>
  <link th:href="@{/vue-components/style-v0.0.3.css}" type="text/css" rel="stylesheet" media="screen, projection">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/vuetify@3.7.3/dist/vuetify.min.css" type="text/css" rel="stylesheet">
</head>
<body>
<div id="phase2-evaluation-app" style="width: 100%"></div>
<script>
  window.loadData = (data) => {
    const { createVuetify } = Vuetify
    const vuetify = createVuetify()

    Vue.createApp(ElaasticVueComponents.ConfrontingViewpoint, {
      responses: data.map(response => ({
          id: response.id,
          questionType: 'MultipleChoice',
          choices: response.choiceList,
          explanation: response.explanation
        })
      )
    }).use(vuetify).mount(`#phase2-evaluation-app`)
  }
</script>
</body>
</html>
